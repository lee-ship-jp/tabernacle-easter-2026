/* ---- JSONP (Apps Script 웹 앱은 CORS를 막으므로 JSONP로 호출) ---- */
function jsonp(params, timeoutMs){
  return new Promise((resolve, reject) => {
    if (!APP_READY) { reject(new Error('no-config')); return; }
    const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*1e6);
    const qs = Object.keys(params).map(k => encodeURIComponent(k)+'='+encodeURIComponent(params[k])).join('&');
    const s = document.createElement('script');
    let done = false;
    const cleanup = () => { delete window[cb]; if (s.parentNode) s.parentNode.removeChild(s); };
    const timer = setTimeout(() => { if(!done){ done=true; cleanup(); reject(new Error('timeout')); } }, timeoutMs || 15000);
    window[cb] = (data) => { if(done) return; done=true; clearTimeout(timer); cleanup(); resolve(data); };
    s.onerror = () => { if(done) return; done=true; clearTimeout(timer); cleanup(); reject(new Error('network')); };
    s.src = APPS_URL + '?callback=' + cb + '&' + qs;
    document.body.appendChild(s);
  });
}

function setLang(l){ lang = l; render(); }

async function submitReg(ev){
  ev.preventDefault();
  if (submitting) return;
  const t = T[lang];
  const name = (document.getElementById('reg-name').value || '').trim();
  const phone = (document.getElementById('reg-phone').value || '').trim();
  const org = (document.getElementById('reg-org').value || '').trim();
  let count = parseInt(document.getElementById('reg-count').value, 10);
  if (!count || count < 1) count = 1;
  if (!name || !phone){ alert(t.regNeedName); return; }
  if (!APP_READY){ alert(t.regNoConfig); return; }

  const btn = document.getElementById('reg-btn');
  submitting = true;
  if (btn){ btn.disabled = true; btn.style.opacity = '.6'; btn.textContent = t.regBusy; }
  try {
    const res = await jsonp({ action:'register', name, phone, org, count });
    if (res && res.ok){
      issuedTicket = { ticket: res.ticket, name: res.name || name, count: res.count || count };
      render();
      const sec = document.getElementById('register');
      if (sec) sec.scrollIntoView({ behavior:'smooth', block:'start' });
    } else {
      alert(t.regErr);
      if (btn){ btn.disabled = false; btn.style.opacity = '1'; btn.textContent = t.regSubmit; }
    }
  } catch(e){
    alert(t.regErr);
    if (btn){ btn.disabled = false; btn.style.opacity = '1'; btn.textContent = t.regSubmit; }
  } finally {
    submitting = false;
  }
}

function qrPayload(){
  const u = new URL('checkin.html', location.href);
  u.searchParams.set('t', issuedTicket.ticket);
  return u.href;
}

function drawQR(){
  const c = document.getElementById('qr-canvas');
  if (!c || !issuedTicket) return;
  if (typeof window.qrcode === 'undefined'){ setTimeout(drawQR, 250); return; }
  try {
    const qr = qrcode(0, 'M');          // 0 = 자동 타입, 'M' = 오류복원 중간
    qr.addData(qrPayload());
    qr.make();
    const count = qr.getModuleCount();
    const quiet = 4;                     // 여백(모듈 단위)
    const total = count + quiet * 2;
    const cell = Math.max(4, Math.floor(720 / total));  // 고해상도(≈720px)로 렌더 → 인쇄/캡처 선명
    const dim = cell * total;
    c.width = dim; c.height = dim;
    c.style.width = '240px'; c.style.height = '240px';
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, dim, dim);
    ctx.fillStyle = '#0b0e1d';
    for (let r = 0; r < count; r++){
      for (let col = 0; col < count; col++){
        if (qr.isDark(r, col)) ctx.fillRect((col + quiet) * cell, (r + quiet) * cell, cell, cell);
      }
    }
  } catch(e){ console.error(e); }
}

function downloadQR(){
  const c = document.getElementById('qr-canvas');
  if (!c || !issuedTicket) return;
  try {
    const a = document.createElement('a');
    a.href = c.toDataURL('image/png');
    a.download = 'easter-ticket-' + issuedTicket.ticket + '.png';
    document.body.appendChild(a); a.click(); a.remove();
  } catch(e){ alert('QR 이미지를 길게 눌러 저장해 주세요. / Long-press the QR to save.'); }
}

function resetReg(){
  issuedTicket = null;
  submitting = false;
  render();
  const sec = document.getElementById('register');
  if (sec) sec.scrollIntoView({ behavior:'smooth', block:'start' });
}

function tickCountdown(){
  const target = new Date('2026-07-15T17:30:00+09:00').getTime();
  let diff = Math.max(0, target - Date.now());
  const day = Math.floor(diff/86400000); diff -= day*86400000;
  const hr  = Math.floor(diff/3600000); diff -= hr*3600000;
  const mn  = Math.floor(diff/60000);  diff -= mn*60000;
  const sc  = Math.floor(diff/1000);
  const pad = n => String(n).padStart(2,'0');
  const set = (id,v)=>{ const el=document.getElementById(id); if(el) el.textContent=v; };
  set('cd-d', day); set('cd-h', pad(hr)); set('cd-m', pad(mn)); set('cd-s', pad(sc));
}

render();
tickCountdown();
setInterval(tickCountdown, 1000);
</script>
